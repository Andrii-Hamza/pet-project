services:
  postgresql:
    container_name: postgresql
    image: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      PGDATA: /data/postgres
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - microservices-net
    restart: unless-stopped

  mongodb:
    container_name: ms_mongo_db
    image: mongo
    ports:
      - 27017:27017
    volumes:
      - mongo:/data
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: admin
    networks:
      - microservices-net

  mongo-express:
    container_name: ms_mongo_express
    image: mongo-express
    restart: unless-stopped
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongodb:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: root
    networks:
      - microservices-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    #Zookeeper is already deprecated. i should use KRaft mode instead, but ive pinted version 7.6.0 to learn it
    container_name: zookeeper
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    #todo see how it will work without THIS port
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ms_kafka
    ports:
       - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ms_kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - microservices-net

  mail-dev:
    container_name: ms_mail_dev
    image: maildev/maildev
    ports:
      - 1080:1080
      - 1025:1025
    networks:
      - microservices-net

  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin
    ports:
      - 9411:9411
    networks:
      - microservices-net

  redis:
    container_name: redis
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - microservices-net

  ## Microservices

  config-server:
    container_name: config-server
    build:
      context: ./services/config-server
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-net
    restart: unless-stopped

  discovery-service:
    container_name: discovery-service
    build:
      context: ./services/discovery-service
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: discovery-service
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-net
    restart: unless-stopped

  customer-service:
    container_name: customer-service
    build:
      context: ./services/customer
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: customer-service
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MONGODB_HOST: ms_mongo_db
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  product-service:
    container_name: product-service
    build:
      context: ./services/product
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: product-service
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      POSTGRES_HOST: postgresql
      REDIS_HOST: redis
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  order-service:
    container_name: order-service
    build:
      context: ./services/order
      dockerfile: Dockerfile
    ports:
      - "8070:8070"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: order-service
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      POSTGRES_HOST: postgresql
      KAFKA_BOOTSTRAP_SERVERS: ms_kafka:29092
      GATEWAY_HOST: gateway
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  payment-service:
    container_name: payment-service
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    ports:
      - "8060:8060"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: payment-service
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      POSTGRES_HOST: postgresql
      KAFKA_BOOTSTRAP_SERVERS: ms_kafka:29092
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  notification-service:
    container_name: notification-service
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    ports:
      - "8040:8040"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: notification-service
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MONGODB_HOST: ms_mongo_db
      KAFKA_BOOTSTRAP_SERVERS: ms_kafka:29092
      MAIL_HOST: ms_mail_dev
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  gateway:
    container_name: gateway
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8222:8222"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_HOSTNAME: gateway
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    depends_on:
      customer-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - microservices-net
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  mongo:
  redis:

